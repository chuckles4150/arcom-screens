# Drop this into Chuck's existing Pi 5 Docker setup.
# Sits alongside n8n and actual-budget — no port conflicts (uses 8080).
#
# To deploy:
#   1. Clone the repo to ~/arcom-screens on the Pi 5
#   2. Copy .env.example to .env and set DASHBOARD_PASSWORD
#   3. docker compose up -d
#
# To update later: git pull && docker compose up -d --build

services:
  arcom-screens:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arcom-screens
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - NODE_ENV=production
    volumes:
      - ./data:/app/server/data
