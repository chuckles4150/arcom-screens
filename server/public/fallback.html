<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcom Screens — Connection issue</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Open+Sans:wght@400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --arc-navy: #002B49;
      --arc-navy-deep: #0F1A24;
      --arc-sage: #7BA06A;
      --arc-sage-lifted: #9FC290;
      --arc-bone: #FAF7F2;
      --arc-sand: #D8D2C6;
      --arc-taupe: #8A8275;
      --arc-yellow: #FFB627;
      --arc-danger: #E8734F;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Open Sans', system-ui, sans-serif;
      background: var(--arc-navy-deep);
      color: var(--arc-bone);
    }

    .last-content {
      position: fixed;
      inset: 0;
      background: var(--arc-navy-deep);
      filter: grayscale(0.6) brightness(0.5);
      z-index: 1;
    }

    .banner {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--arc-navy);
      border-top: 3px solid var(--arc-danger);
      padding: 32px 48px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 32px;
      box-shadow: 0 -12px 48px rgba(0,0,0,0.4);
      animation: slideUp 400ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .icon-wrap {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      background: rgba(232, 115, 79, 0.15);
      border: 1px solid var(--arc-danger);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--arc-danger);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232, 115, 79, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(232, 115, 79, 0); }
    }

    .content {
      flex: 1;
      min-width: 0;
    }

    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--arc-danger);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .title {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--arc-bone);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .body {
      font-size: 13px;
      color: var(--arc-sand);
      line-height: 1.6;
    }

    .meta {
      flex-shrink: 0;
      padding-left: 32px;
      border-left: 1px solid rgba(216, 210, 198, 0.15);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 280px;
    }

    .meta-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--arc-taupe);
      text-transform: uppercase;
    }

    .meta-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--arc-bone);
      font-variant-numeric: tabular-nums;
      word-break: break-all;
    }

    .meta-value.url {
      color: var(--arc-sage-lifted);
      font-size: 11px;
    }

    .retry {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      padding-left: 32px;
      border-left: 1px solid rgba(216, 210, 198, 0.15);
    }

    .retry-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--arc-taupe);
      text-transform: uppercase;
    }

    .retry-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--arc-sage-lifted);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .retry-sub {
      font-size: 11px;
      color: var(--arc-taupe);
    }

    .top-strip {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--arc-danger) 0%, var(--arc-yellow) 50%, var(--arc-danger) 100%);
      z-index: 99;
      animation: slide 3s linear infinite;
      background-size: 200% 100%;
    }

    @keyframes slide {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .brand-corner {
      position: fixed;
      top: 24px;
      right: 32px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--arc-bone);
      opacity: 0.7;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      background: rgba(123, 160, 106, 0.15);
      border: 1px solid rgba(159, 194, 144, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.16em;
    }
  </style>
</head>
<body>

  <div class="last-content"></div>

  <div class="top-strip"></div>

  <div class="brand-corner">
    <div class="brand-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="4" width="20" height="14" rx="1" stroke="#FAF7F2" stroke-width="1.5"/>
        <path d="M8 18v3M16 18v3M6 21h12" stroke="#FAF7F2" stroke-width="1.5"/>
      </svg>
    </div>
    <span class="brand-text">ARCOM SCREENS</span>
  </div>

  <div class="banner">

    <div class="icon-wrap">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M12 9v3.5M12 16.5h.01" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        <path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="content">
      <p class="eyebrow">CONNECTION FAILED</p>
      <h1 class="title">This page is temporarily unavailable</h1>
      <p class="body">
        Showing the last successful render. Will retry automatically — please check the dashboard if this persists.
      </p>
    </div>

    <div class="meta">
      <div class="meta-row">
        <span class="meta-label">SCREEN</span>
        <span class="meta-value" id="hostname">pi-printroom</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">FAILED URL</span>
        <span class="meta-value url" id="failed-url">arcom.site/arcom/dashboard/sales</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">SINCE</span>
        <span class="meta-value" id="since-time">12:51 · 14 sec ago</span>
      </div>
    </div>

    <div class="retry">
      <span class="retry-eyebrow">RETRYING IN</span>
      <span class="retry-counter" id="counter">28</span>
      <span class="retry-sub">seconds</span>
    </div>

  </div>

  <script>
    // Read params from URL: ?hostname=pi-printroom&url=...&since=ISO
    const params = new URLSearchParams(window.location.search);

    const hostname = params.get('hostname') || 'pi-unknown';
    const failedUrl = params.get('url') || '';
    const sinceIso = params.get('since') || new Date().toISOString();

    document.getElementById('hostname').textContent = hostname;
    if (failedUrl) {
      document.getElementById('failed-url').textContent =
        failedUrl.replace(/^https?:\/\//, '');
    }

    const startTime = new Date(sinceIso).getTime();
    let secondsLeft = 30;
    const counter = document.getElementById('counter');
    const since = document.getElementById('since-time');

    function update() {
      counter.textContent = secondsLeft;

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const t = new Date(startTime).toLocaleTimeString('en-AU', {
        hour: '2-digit', minute: '2-digit', hour12: false
      });
      since.textContent = `${t} · ${elapsed}s ago`;
    }

    update();

    setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) {
        // Reload the fallback page — kiosk script's main loop handles retries
        window.location.reload();
      }
      update();
    }, 1000);
  </script>

</body>
</html>
